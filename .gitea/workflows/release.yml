name: Build & Publish Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: intl, pdo_sqlite, pdo_mysql, pdo_pgsql, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version
        id: vars
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Install PHP dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress
        env:
          APP_ENV: prod
          APP_SECRET: build_placeholder
          DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data.db"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: php bin/console tailwind:build --minify
        env:
          APP_ENV: prod
          APP_SECRET: build_placeholder

      - name: Compile assets
        run: php bin/console asset-map:compile
        env:
          APP_ENV: prod
          APP_SECRET: build_placeholder

      - name: Clear cache
        run: php bin/console cache:clear --env=prod
        env:
          APP_ENV: prod
          APP_SECRET: build_placeholder
          DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data.db"

      - name: Prepare release archive
        run: |
          VERSION=${{ steps.vars.outputs.version }}

          # Ensure required empty directories are present in the archive
          mkdir -p var/cache var/log
          touch var/cache/.gitkeep var/log/.gitkeep

          zip -r "kumora-${VERSION}.zip" . \
            -x ".git/*" \
            -x ".gitignore" \
            -x "node_modules/*" \
            -x "var/cache/*" \
            -x "var/log/*" \
            -x "var/data.db" \
            -x "tests/*" \
            -x ".php-cs-fixer.dist.php" \
            -x ".php-cs-fixer.cache" \
            -x "phpstan.dist.neon" \
            -x "phpstan-baseline.neon" \
            -x "rector.php" \
            -x "phpunit.xml.dist" \
            -x "renovate.json" \
            -x ".env.local" \
            -x ".env.test" \
            -x ".env.*.local" \
            -x ".idea/*" \
            -x ".vscode/*" \
            -x ".fleet/*"

          # Re-add the empty directory placeholders excluded above
          zip "kumora-${VERSION}.zip" var/cache/.gitkeep var/log/.gitkeep

          echo "Archive size: $(du -sh kumora-${VERSION}.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: kumora-${{ steps.vars.outputs.version }}
          path: "*.zip"
          retention-days: 30

      - name: Publish on release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
