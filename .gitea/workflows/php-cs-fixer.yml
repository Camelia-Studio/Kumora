
name: Apply PHP CS Fixer

on: [push]

jobs:
  php-cs-fixer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run PHP CS Fixer
        uses: docker://oskarstark/php-cs-fixer-ga@sha256:9f862de18c5fc1c0a7c7d840caab59eefea48069fbb6301f46fceef3b2aa72d6
        with:
          args: --diff --dry-run

