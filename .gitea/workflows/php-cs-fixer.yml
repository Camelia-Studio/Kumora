
name: Apply PHP CS Fixer

on: [push]

jobs:
  php-cs-fixer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run PHP CS Fixer
        uses: docker://oskarstark/php-cs-fixer-ga@sha256:31d3315177176e564771a9a9a8e2064390b7895d8ab7454afc2078c08515bb78
        with:
          args: --diff --dry-run

