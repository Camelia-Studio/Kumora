
name: Apply PHP CS Fixer

on: [push]

jobs:
  php-cs-fixer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run PHP CS Fixer
        uses: docker://oskarstark/php-cs-fixer-ga@sha256:009c4e3ad4161c33d1893025e2e3bd59818634bd04f0b0bcdb8cd6ba0165df30
        with:
          args: --diff --dry-run

