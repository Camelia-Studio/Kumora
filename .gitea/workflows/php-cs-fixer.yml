
name: Apply PHP CS Fixer

on: [push]

jobs:
  php-cs-fixer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run PHP CS Fixer
        uses: docker://oskarstark/php-cs-fixer-ga@sha256:c29adac93ee58e52ddaa5630337e3084bedf8aa8ed5cf3022753f7bd7f691981
        with:
          args: --diff --dry-run

